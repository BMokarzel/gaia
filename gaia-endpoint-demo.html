<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaia — POST /checkout · Endpoint Flow</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green:   #39FF6E;
  --pink:    #FF3C8E;
  --orange:  #FF7A1A;
  --blue:    #00BFFF;
  --purple:  #B47AFF;
  --amber:   #FFD166;
  --white:   #F2F2F0;
  --black:   #0A0A0C;
  --surface: #111115;
  --surf2:   #18181E;
  --border:  #2A2A35;
  --muted:   #6B6B78;
}

html, body { height: 100%; overflow: hidden; }
body { font-family: 'Space Grotesk', sans-serif; background: var(--black); color: var(--white); display: flex; }

/* ── SIDEBAR ─────────────────────────────────────────────────── */
.sidebar {
  width: 64px; height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center;
  padding: 16px 0 20px; flex-shrink: 0; z-index: 10;
}
.logo-mark { width: 36px; height: 36px; margin-bottom: 20px; }
.nav-btn {
  width: 44px; height: 44px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--muted); border: none; background: transparent;
  transition: background 180ms, color 180ms;
}
.nav-btn:hover { background: rgba(255,255,255,0.06); color: var(--white); }
.nav-btn.active { background: rgba(57,255,110,0.12); color: var(--green); }
.nav-btn + .nav-btn { margin-top: 4px; }
.sidebar-bottom { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, var(--green), var(--blue));
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--black);
}

/* ── MAIN ────────────────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  height: 48px; background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 5px; flex-shrink: 0;
}
.crumb { font-size: 13px; color: var(--muted); cursor: pointer; }
.crumb:hover { color: var(--white); }
.crumb.cur { color: var(--white); font-weight: 500; }
.sep { color: var(--border); font-size: 13px; }

.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

.badge {
  padding: 3px 10px; border-radius: 999px;
  font-size: 11px; font-weight: 500; letter-spacing: 0.04em;
}
.b-green  { background: rgba(57,255,110,0.12);  color: var(--green);  }
.b-blue   { background: rgba(0,191,255,0.12);   color: var(--blue);   }
.b-orange { background: rgba(255,122,26,0.12);  color: var(--orange); }
.b-amber  { background: rgba(255,209,102,0.12); color: var(--amber);  }
.b-pink   { background: rgba(255,60,142,0.12);  color: var(--pink);   }
.b-gray   { background: rgba(242,242,240,0.08); color: var(--muted);  }

.btn-ghost {
  height: 30px; padding: 0 12px; border-radius: 7px;
  border: 1px solid var(--border); background: transparent; color: var(--muted);
  font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer;
  transition: border-color 180ms, color 180ms;
}
.btn-ghost:hover { border-color: var(--green); color: var(--green); }

.level-switch {
  display: flex; border: 1px solid var(--border); border-radius: 7px; overflow: hidden;
}
.lvl-btn {
  height: 28px; padding: 0 12px; font-family: inherit; font-size: 11px;
  font-weight: 500; background: transparent; border: none; color: var(--muted);
  cursor: pointer; transition: background 150ms, color 150ms;
}
.lvl-btn.active { background: rgba(57,255,110,0.12); color: var(--green); }

/* ── CANVAS ──────────────────────────────────────────────────── */
.canvas-wrap {
  flex: 1; position: relative; overflow: hidden;
  background: var(--black);
  background-image: radial-gradient(circle, rgba(255,255,255,0.028) 1px, transparent 1px);
  background-size: 24px 24px;
  cursor: grab;
}
.canvas-wrap:active { cursor: grabbing; }
#svg { width: 100%; height: 100%; overflow: visible; }

/* ── LEGEND ──────────────────────────────────────────────────── */
.legend {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 14px; align-items: center;
  background: rgba(17,17,21,0.88); padding: 8px 18px;
  border-radius: 999px; border: 1px solid var(--border);
  backdrop-filter: blur(8px); font-size: 11px; color: var(--muted);
  pointer-events: none; white-space: nowrap;
}
.leg-item { display: flex; align-items: center; gap: 5px; }
.leg-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.leg-pill   { width: 10px; height: 10px; border-radius: 999px; flex-shrink: 0; }
.leg-diamond { width: 9px; height: 9px; transform: rotate(45deg); flex-shrink: 0; }
.leg-dash { width: 10px; height: 10px; border-radius: 2px; border: 1px dashed; flex-shrink: 0; }

/* ── PANEL ───────────────────────────────────────────────────── */
.panel {
  position: absolute; right: 0; top: 0; bottom: 0; width: 340px;
  background: var(--surf2); border-left: 1px solid var(--border);
  transform: translateX(100%);
  transition: transform 300ms cubic-bezier(0.25,0.46,0.45,0.94);
  z-index: 20; display: flex; flex-direction: column;
}
.panel.open { transform: translateX(0); }

.ph {
  padding: 18px 18px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 10px;
}
.ph-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600;
  flex-shrink: 0; margin-top: 2px;
}
.ph-info { flex: 1; min-width: 0; }
.ph-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ph-sub  { font-size: 11px; color: var(--muted); margin-top: 3px; }
.ph-close {
  width: 26px; height: 26px; border-radius: 6px;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.ph-close:hover { background: rgba(255,255,255,0.06); color: var(--white); }

.p-badges { padding: 10px 18px; display: flex; gap: 5px; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
.p-stats  {
  padding: 14px 18px; display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; border-bottom: 1px solid var(--border);
}
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
.stat-val { font-size: 22px; font-weight: 700; line-height: 1; }
.stat-lbl { font-size: 10px; color: var(--muted); margin-top: 4px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }

.p-sec { padding: 12px 18px; border-bottom: 1px solid var(--border); }
.p-sec:last-of-type { border-bottom: none; }
.p-sec-title { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }

.p-mono {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--white); background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 10px; word-break: break-all; line-height: 1.7;
}

.p-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 5px 0; font-size: 12px; border-bottom: 1px solid rgba(42,42,53,0.5); gap: 10px; }
.p-row:last-child { border-bottom: none; }
.p-row-key { color: var(--muted); white-space: nowrap; flex-shrink: 0; }
.p-row-val { color: var(--white); font-family: 'JetBrains Mono', monospace; font-size: 11px; text-align: right; }

.p-actions { margin-top: auto; padding: 14px 18px; display: flex; gap: 8px; }
.btn-primary {
  flex: 1; height: 34px; border-radius: 8px; border: none;
  background: var(--green); color: var(--black);
  font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
  transition: box-shadow 200ms;
}
.btn-primary:hover { box-shadow: 0 0 20px rgba(57,255,110,0.4); }

/* ── TOOLTIP ─────────────────────────────────────────────────── */
.tip {
  position: fixed; pointer-events: none;
  background: var(--surf2); border: 1px solid var(--border);
  border-radius: 8px; padding: 7px 11px; font-size: 11.5px;
  white-space: nowrap; opacity: 0; transition: opacity 150ms; z-index: 99;
}
.tip.show { opacity: 1; }
</style>
</head>

const NS = 'http://www.w3.org/2000/svg';
function mk(tag, attrs) {
  const el = document.createElementNS(NS, tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, String(v)));
  return el;
}
function txt(content, attrs) {
  const el = mk('text', attrs);
  el.textContent = content;
  return el;
}

    color: '#FF3C8E',
    panel: {

// Edge colors and markers by kind
const E_CLR  = { flow:'#2A2A35',  true:'#2A2A35',  false:'#2A2A35',  async:'#1E1500' };
const E_ACLR = { flow:'#39FF6E',  true:'#39FF6E',  false:'#FF3C8E',  async:'#FF7A1A' };
const E_ARW  = { flow:'ar-def',   true:'ar-def',   false:'ar-def',   async:'ar-def'  };

// ── STATE ─────────────────────────────────────────────────────────
const nodeMap = {};
NODES.forEach(n => nodeMap[n.id] = n);
const nEl = {};   // id → { g, hitRect, mainRect }
const eEl = {};   // id → { path, hitPath }
let selected = null;
let panX = 0, panY = 0, panStart = null;

// ── INIT ──────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const canvas = document.getElementById('canvas');
  resetView(false);
  draw();

  // Pan
  canvas.addEventListener('mousedown', e => {
    if (e.target.closest('[data-nid]')) return;
    panStart = { x: e.clientX - panX, y: e.clientY - panY };
  });
  window.addEventListener('mousemove', e => {
    if (!panStart) return;
    panX = e.clientX - panStart.x;
    panY = e.clientY - panStart.y;
    applyPan();
  });
  window.addEventListener('mouseup', () => { panStart = null; });

  canvas.addEventListener('click', e => {
    if (e.target === canvas || e.target.id === 'svg' || e.target.id === 'root') {
      deselect(); closePanel();
    }
  });

  window.addEventListener('resize', resetView);
});

function resetView(redoLayout) {
  const canvas = document.getElementById('canvas');
  const W = canvas.clientWidth;
  const H = canvas.clientHeight;
  panX = (W - 1000) / 2;
  panY = Math.max(20, (H - 1320) / 2);
  applyPan();
  if (redoLayout !== false && Object.keys(nEl).length) redrawAll();
}

function applyPan() {
  document.getElementById('root').style.transform = `translate(${panX}px,${panY}px)`;
}

// ── DRAW ──────────────────────────────────────────────────────────
function draw() {
  drawParallelContainer();
  drawEdges();
  drawNodes();
}

function redrawAll() {
  ['el','nl','wl'].forEach(id => { document.getElementById(id).innerHTML = ''; });
  Object.keys(nEl).forEach(k => delete nEl[k]);
  Object.keys(eEl).forEach(k => delete eEl[k]);
  draw();
}

function drawEdges() {
  const el = document.getElementById('el');

  EDGES.forEach(edge => {
    const path = mk('path', {
      id: edge.id,
      d: edge.d,
      stroke: E_CLR[edge.kind],
      'stroke-width': '1.5',
      fill: 'none',
      'marker-end': `url(#${E_ARW[edge.kind]})`,
      ...(edge.kind === 'async' ? { 'stroke-dasharray': '6 4' } : {})
    });

    // Wider invisible hit area
    const hitPath = mk('path', {
      d: edge.d, stroke: 'transparent', 'stroke-width': '16', fill: 'none',
      style: 'cursor:default'
    });

    // Edge label (true/false)
    if (edge.label) {
      const isTrue = edge.label === 'true';
      // Approximate midpoint label position
      const pts = edge.d.match(/-?\d+\.?\d*/g).map(Number);
      // For straight lines: midpoint of start→end; for curves: use control pts
      let lx, ly;
      if (edge.d.startsWith('M') && edge.d.includes('L') && !edge.d.includes('C')) {
        lx = (pts[0] + pts[2]) / 2 + (isTrue ? 8 : 4);
        ly = (pts[1] + pts[3]) / 2 - 5;
      } else {
        lx = pts[0] + (isTrue ? 8 : 5);
        ly = pts[1] - 5;
      }

      const lbg = mk('rect', {
        x: lx - 2, y: ly - 11, width: isTrue ? 26 : 29, height: 14, rx: 3,
        fill: isTrue ? 'rgba(57,255,110,0.10)' : 'rgba(255,60,142,0.10)',
      });
      const lt = txt(edge.label, {
        x: lx + (isTrue ? 11 : 12.5), y: ly - 1,
        'text-anchor': 'middle',
        'font-size': '9.5', 'font-weight': '500',
        fill: isTrue ? '#39FF6E' : '#FF3C8E',
        'font-family': 'Space Grotesk, sans-serif',
        'letter-spacing': '0.02em'
      });
      el.appendChild(lbg);
      el.appendChild(lt);
    }

    hitPath.addEventListener('mouseenter', () => {
      if (selected) return;
      activateEdge(path, edge);
    });
    hitPath.addEventListener('mouseleave', () => {
      if (selected) return;
      resetEdge(path, edge);
    });

    el.appendChild(path);
    el.appendChild(hitPath);
    eEl[edge.id] = { path, edge };
  });
}

function drawNodes() {
  const nl = document.getElementById('nl');

  NODES.forEach((node, idx) => {
    const g = mk('g', { 'data-nid': node.id });
    g.style.cursor = 'pointer';

    if (node.type === 'condition') {
      drawDiamondNode(g, node);
    } else if (node.type === 'return') {
      drawReturnNode(g, node);
    } else {
      drawBlockNode(g, node);
    }

    nl.appendChild(g);
    if (!nEl[node.id]) nEl[node.id] = {};
    nEl[node.id].g = g;

    // Staggered entry
    g.style.opacity = '0';
    g.style.transformOrigin = `${node.cx || node.x + (node.w||0)/2}px ${node.cy || node.y + (node.h||0)/2}px`;
    g.style.transform = 'scale(0.85)';
    setTimeout(() => {
      g.style.transition = 'opacity 350ms ease, transform 400ms cubic-bezier(0.34,1.56,0.64,1)';
      g.style.opacity = '1';
      g.style.transform = 'scale(1)';
    }, 80 + idx * 55);

    // Hover
    g.addEventListener('mouseenter', e => {
      if (selected === node.id) return;
      highlightNode(node.id, true);
      showTip(node, e.clientX, e.clientY);
    });
    g.addEventListener('mouseleave', () => {
      if (selected === node.id) return;
      highlightNode(node.id, false);
      hideTip();
    });

    // Click select
    g.addEventListener('click', e => {
      e.stopPropagation(); hideTip();
      selected === node.id ? deselect() : selectNode(node.id);
    });

    // Double-click panel
    g.addEventListener('dblclick', e => {
      e.stopPropagation(); hideTip();
      selectNode(node.id);
      openPanel(node.id);
    });
  });
}

// ── NODE RENDERERS ────────────────────────────────────────────────
function drawBlockNode(g, node) {
  const { x, y, w, h, color, label, sub, type, tag, method } = node;

  // Compute visual style by type
  let fillAlpha, strokeColor, strokeAlpha, dashed = false, filter = '';
  if (type === 'endpoint') {
    fillAlpha = 0.10; strokeColor = color; strokeAlpha = 1; filter = 'url(#fg)';
  } else if (type === 'db') {
    fillAlpha = 0.05; strokeColor = color; strokeAlpha = 0.25; filter = 'url(#fb)';
  } else if (type === 'http') {
    fillAlpha = 0.06; strokeColor = color; strokeAlpha = 0.4; filter = 'url(#fo)';
  } else if (type === 'event') {
    fillAlpha = 0.05; strokeColor = color; strokeAlpha = 0.3; dashed = true; filter = 'url(#fo)';
  } else {
    // function
    fillAlpha = 0.04; strokeColor = '#2A2A35'; strokeAlpha = 1;
  }

  const rgb = hexRGB(color);

  // Background rect
  const bg = mk('rect', {
    x, y, width: w, height: h, rx: 10,
    fill: `rgba(${rgb},${fillAlpha})`,
    stroke: strokeColor,
    'stroke-width': '1.5',
    ...(strokeAlpha < 1 ? { stroke: `rgba(${hexRGB(strokeColor)},${strokeAlpha})` } : {}),
    ...(dashed ? { 'stroke-dasharray': '7 4' } : {}),
    ...(filter ? { filter } : {})
  });
  g.appendChild(bg);

  // Left accent bar
  g.appendChild(mk('rect', { x, y, width: 3, height: h, rx: 1.5, fill: color }));

  // Tag chip (fn / db / HTTP method / evt)
  const HTTP_METHODS = ['GET','POST','PUT','PATCH','DELETE'];
  let labelOffsetX = 14;

  if (tag) {
    const tagX = x + 10;
    const tagCenterY = sub ? y + 19 : y + h/2 + 5;

    if (HTTP_METHODS.includes(tag)) {
      // Colored method badge (for endpoints and http calls)
      const bw = tag.length * 7 + 12;
      g.appendChild(mk('rect', {
        x: tagX, y: tagCenterY - 10, width: bw, height: 15, rx: 3,
        fill: `rgba(${hexRGB(color)},0.22)`
      }));
      g.appendChild(txt(tag, {
        x: tagX + bw/2, y: tagCenterY + 1,
        'text-anchor': 'middle', 'font-size': '9', 'font-weight': '700',
        fill: color, 'font-family': 'JetBrains Mono, monospace', 'letter-spacing': '0.05em'
      }));
      labelOffsetX = bw + 18;
    } else {
      // Monospace type tag (fn, db, evt)
      g.appendChild(txt(tag, {
        x: tagX, y: tagCenterY,
        'font-size': '9', 'font-weight': '600',
        fill: color, opacity: '0.55',
        'font-family': 'JetBrains Mono, monospace', 'letter-spacing': '0.04em'
      }));
    }
  }

  const labelX = x + labelOffsetX;
  const labelY = sub ? y + 22 : y + h / 2 + 5;
  const subY   = y + 38;

  g.appendChild(txt(label, {
    x: labelX, y: labelY,
    'font-size': '12.5', 'font-weight': '500', fill: '#F2F2F0',
    'font-family': 'Space Grotesk, sans-serif'
  }));

  if (sub) {
    g.appendChild(txt(sub, {
      x: x + 14, y: subY,
      'font-size': '10.5', fill: '#6B6B78',
      'font-family': 'Space Grotesk, sans-serif'
    }));
  }

  // Store ref for hover effects
  nEl[node.id] = nEl[node.id] || {};
  nEl[node.id].bg = bg;
  nEl[node.id].origFill = bg.getAttribute('fill');
  nEl[node.id].origStroke = bg.getAttribute('stroke');
  nEl[node.id].color = color;
  nEl[node.id].filter = filter;
}

function drawDiamondNode(g, node) {
  const { cx, cy, hw, hh, label, color } = node;
  const pts = `${cx},${cy-hh} ${cx+hw},${cy} ${cx},${cy+hh} ${cx-hw},${cy}`;

  const poly = mk('polygon', {
    points: pts,
    fill: 'rgba(255,209,102,0.07)',
    stroke: '#FFD166', 'stroke-width': '1.5',
    filter: 'url(#fa)'
  });
  g.appendChild(poly);

  g.appendChild(txt(label, {
    x: cx, y: cy + 5,
    'text-anchor': 'middle', 'font-size': '11', 'font-weight': '500',
    fill: '#FFD166', 'font-family': 'Space Grotesk, sans-serif'
  }));

  nEl[node.id] = nEl[node.id] || {};
  nEl[node.id].bg = poly;
  nEl[node.id].color = color;
}

function drawReturnNode(g, node) {
  const { x, y, w, h, code, label, color } = node;
  const rx = h / 2;
  const rgb = hexRGB(color);

  const bg = mk('rect', {
    x, y, width: w, height: h, rx,
    fill: `rgba(${rgb},0.09)`,
    stroke: `rgba(${rgb},0.55)`,
    'stroke-width': '1.5'
  });
  g.appendChild(bg);

  const cx = x + w / 2;

  g.appendChild(txt(`${code}`, {
    x: cx, y: y + h/2 - 2,
    'text-anchor': 'middle',
    'font-size': '11', 'font-weight': '700', fill: color,
    'font-family': 'Space Grotesk, sans-serif', 'letter-spacing': '0.04em'
  }));
  g.appendChild(txt(label, {
    x: cx, y: y + h/2 + 12,
    'text-anchor': 'middle',
    'font-size': '9.5', fill: color, opacity: '0.65',
    'font-family': 'Space Grotesk, sans-serif'
  }));

  nEl[node.id] = nEl[node.id] || {};
  nEl[node.id].bg = bg;
  nEl[node.id].color = color;
}

// ── SELECTION ─────────────────────────────────────────────────────
function selectNode(id) {
  selected = id;
  const connectedEdges = new Set();
  const connectedNodes = new Set([id]);

  EDGES.forEach(e => {
    if (e.s === id || e.t === id) {
      connectedEdges.add(e.id);
      connectedNodes.add(e.s);
      connectedNodes.add(e.t);
    }
  });

  // Dim unconnected nodes
  NODES.forEach(n => {
    const e = nEl[n.id]; if (!e) return;
    e.g.style.transition = 'opacity 250ms ease';
    e.g.style.opacity = connectedNodes.has(n.id) ? '1' : '0.12';
  });

  // Edge states
  Object.values(eEl).forEach(({ path, edge }) => {
    if (connectedEdges.has(edge.id)) activateEdge(path, edge);
    else dimEdge(path);
  });

  // Glow the selected node
  highlightNode(id, true, true);
}

function deselect() {
  selected = null;
  NODES.forEach(n => {
    const e = nEl[n.id]; if (!e) return;
    e.g.style.opacity = '1';
  });
  Object.values(eEl).forEach(({ path, edge }) => resetEdge(path, edge));
  NODES.forEach(n => highlightNode(n.id, false));
}

function highlightNode(id, on, strong) {
  const e = nEl[id]; if (!e || !e.bg) return;
  const node = nodeMap[id]; if (!node) return;
  const color = e.color || '#39FF6E';
  const rgb = hexRGB(color);

  if (node.type === 'condition') {
    e.bg.setAttribute('fill', on ? `rgba(${rgb},0.14)` : 'rgba(255,209,102,0.07)');
    e.bg.setAttribute('stroke-width', on ? '2' : '1.5');
  } else if (node.type === 'return') {
    e.bg.setAttribute('stroke', on ? color : `rgba(${rgb},0.55)`);
    e.bg.setAttribute('stroke-width', on ? '2' : '1.5');
  } else {
    const al = strong ? 0.18 : on ? 0.12 : (e.origFill ? parseFloat((e.origFill.match(/[\d.]+(?=\)$)/) || ['0.05'])[0]) : 0.05);
    e.bg.setAttribute('fill', `rgba(${rgb},${al})`);
    if (node.type !== 'function') {
      const sAl = strong ? 0.8 : on ? 0.6 : (node.type === 'http' || node.type === 'event' ? 0.35 : node.type === 'db' ? 0.25 : 0.55);
      e.bg.setAttribute('stroke', `rgba(${rgb},${sAl})`);
      e.bg.setAttribute('stroke-width', on ? '2' : '1.5');
    }
  }
}

// ── EDGE HELPERS ──────────────────────────────────────────────────
function activateEdge(path, edge) {
  path.setAttribute('stroke', E_ACLR[edge.kind]);
  path.setAttribute('stroke-width', '2');
  path.setAttribute('marker-end', `url(#${E_ARAW[edge.kind]})`);
  if (edge.kind === 'async') path.setAttribute('stroke-dasharray', '6 4');
  else path.removeAttribute('stroke-dasharray');
  fireWaveOnEdge(edge);
}
function resetEdge(path, edge) {
  path.setAttribute('stroke', E_CLR[edge.kind]);
  path.setAttribute('stroke-width', '1.5');
  path.setAttribute('marker-end', `url(#${E_ARW[edge.kind]})`);
  if (edge.kind === 'async') path.setAttribute('stroke-dasharray', '6 4');
  else path.removeAttribute('stroke-dasharray');
}
function dimEdge(path) {
  path.setAttribute('stroke', 'rgba(42,42,53,0.18)');
  path.setAttribute('stroke-width', '1');
  path.setAttribute('marker-end', 'url(#ar-def)');
}

// ── WAVE ANIMATION ────────────────────────────────────────────────
function fireWaveOnEdge(edge) {
  const wl = document.getElementById('wl');
  const edgeColor = E_ACLR[edge.kind];
  const dur = edge.kind === 'async' ? 1100 : edge.kind === 'false' ? 600 : 750;

  const dot = mk('circle', { r: '4', fill: edgeColor, filter: 'url(#fw)' });

  const motion = mk('animateMotion', {
    dur: `${dur}ms`, fill: 'remove', calcMode: 'spline',
    keyTimes: '0;1', keySplines: '0.4 0 0.6 1'
  });
  const mpath = mk('mpath');
  mpath.setAttributeNS('http://www.w3.org/1999/xlink', 'xlink:href', `#${edge.id}`);
  motion.appendChild(mpath);

  const fade = mk('animate', {
    attributeName: 'opacity', dur: `${dur}ms`,
    values: '0;0.9;0.9;0', keyTimes: '0;0.05;0.90;1', fill: 'remove'
  });

  dot.appendChild(motion);
  dot.appendChild(fade);
  wl.appendChild(dot);
  setTimeout(() => { if (dot.parentNode) dot.parentNode.removeChild(dot); }, dur + 80);
}

// ── PANEL ─────────────────────────────────────────────────────────
function openPanel(id) {
  const node = nodeMap[id]; if (!node || !node.panel) return;
  const p = node.panel;

  document.getElementById('ph-icon').textContent = p.icon;
  document.getElementById('ph-icon').style.cssText = `background:${p.iconBg};color:${p.iconColor};width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:${p.icon.length > 1 ? '10' : '16'}px;font-weight:600;flex-shrink:0;margin-top:2px;font-family:${p.icon.length <= 2 ? "'JetBrains Mono'" : 'inherit'},monospace`;
  document.getElementById('ph-name').textContent = p.title;
  document.getElementById('ph-sub').textContent  = p.sub;

  // Badges
  const bEl = document.getElementById('p-badges');
  bEl.innerHTML = '';
  (p.badges || []).forEach(b => {
    const s = document.createElement('span');
    s.className = 'badge';
    // pick badge color by content
    if (/^(GET|POST|PUT|DELETE|PATCH)$/.test(b)) s.className += ' b-orange';
    else if (/^\d{3}$/.test(b) || b.includes('xx')) s.className += (/^2/.test(b) || b.includes('2xx') ? ' b-green' : ' b-pink');
    else if (/(db|sql|SELECT|INSERT|UPDATE|transaction|Prisma)/i.test(b)) s.className += ' b-blue';
    else if (/(async|kafka|event|emit|publish)/i.test(b)) s.className += ' b-orange';
    else if (/(error|throw|fail)/i.test(b)) s.className += ' b-pink';
    else if (/(JWT|auth|guard)/i.test(b)) s.className += ' b-amber';
    else s.className += ' b-gray';
    s.textContent = b;
    bEl.appendChild(s);
  });

  // Stats
  const sEl = document.getElementById('p-stats');
  sEl.innerHTML = '';
  const statEntries = Object.entries(p.stats || {});
  if (statEntries.length) {
    sEl.style.display = 'grid';
    statEntries.forEach(([k, v]) => {
      const d = document.createElement('div');
      d.className = 'stat';
      d.innerHTML = `<div class="stat-val" style="color:${p.iconColor}">${v}</div><div class="stat-lbl">${k}</div>`;
      sEl.appendChild(d);
    });
  } else {
    sEl.style.display = 'none';
  }

  // Detail rows
  document.getElementById('p-detail-title').textContent = p.detail;
  const rEl = document.getElementById('p-detail-rows');
  rEl.innerHTML = '';
  (p.rows || []).forEach(r => {
    const row = document.createElement('div');
    row.className = 'p-row';
    row.innerHTML = `<span class="p-row-key">${r.k}</span><span class="p-row-val">${r.v}</span>`;
    rEl.appendChild(row);
  });

  // Source
  if (p.source) {
    document.getElementById('p-source-sec').style.display = 'block';
    document.getElementById('p-source').textContent = p.source;
  } else {
    document.getElementById('p-source-sec').style.display = 'none';
  }

  document.getElementById('panel').classList.add('open');
}

function closePanel() { document.getElementById('panel').classList.remove('open'); }

// ── TOOLTIP ───────────────────────────────────────────────────────
let tipTimer;
function showTip(node, mx, my) {
  clearTimeout(tipTimer);
  const tip = document.getElementById('tip');
  const typeLabel = { endpoint:'endpoint', function:'function', db:'db query', http:'http call', event:'event publish', condition:'if/else', return:'return' }[node.type] || node.type;
  const shortLabel = (node.label || '').length > 42 ? node.label.slice(0,40)+'…' : (node.label || '');
  tip.textContent = `${shortLabel}  ·  ${typeLabel}`;
  tip.style.left = (mx + 14) + 'px';
  tip.style.top  = (my - 34) + 'px';
  tip.classList.add('show');
}
function hideTip() {
  tipTimer = setTimeout(() => document.getElementById('tip').classList.remove('show'), 80);
}

// ── HELPERS ───────────────────────────────────────────────────────
function hexRGB(hex) {
  if (!hex || hex[0] !== '#') return '242,242,240';
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}
